<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Savor — Offline</title>
    <meta name="theme-color" content="#6366f1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e5e7eb;
            padding: 3rem 2.5rem;
            max-width: 420px;
            text-align: center;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #111827; margin-bottom: 0.75rem; }
        p { color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #6366f1;
            color: white;
            font-weight: 600;
            border-radius: 0.75rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>Looks like you lost your connection. Don't worry — any recipes you've already visited are saved and ready to browse.</p>
        <a href="/" class="btn">Go Home</a>
    </div>
</body>
</html>
